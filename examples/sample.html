<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sample HTML App</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111111;
    }
    main {
      text-align: center;
    }
    button {
      min-height: 40px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Sample HTML App</h1>
    <p id="count">Clicked 0 times</p>
    <button id="button" type="button">Click</button>
  </main>
  <script>
    let clicks = Number(localStorage.getItem("sample.clicks") || "0");
    const count = document.getElementById("count");
    const button = document.getElementById("button");

    function render() {
      count.textContent = `Clicked ${clicks} ${clicks === 1 ? "time" : "times"}`;
    }

    button.addEventListener("click", () => {
      clicks += 1;
      localStorage.setItem("sample.clicks", String(clicks));
      render();
    });

    render();
  </script>
</body>
</html>
